<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Change Password</title><link rel="stylesheet" href="assets/css/style.css"></head><body><main style="max-width:560px;margin:60px auto;padding:20px"><div class="card"><h1>🔐 Change Password</h1><p>Enter a new password for your account. Use at least 8 characters.</p><div class="form-group"><label>New password</label><input id="pw1" class="form-input" type="password" minlength="8"></div><div class="form-group"><label>Confirm password</label><input id="pw2" class="form-input" type="password" minlength="8"></div><button class="btn btn-primary" onclick="changePw()">Update password</button> <a class="btn btn-outline" href="dashboard.html">Back</a></div></main><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="assets/js/config.js"></script><script src="assets/js/app.js"></script><script>async function changePw(){const p1=document.getElementById('pw1').value,p2=document.getElementById('pw2').value;if(p1.length<8)return alert('Password must be at least 8 characters');if(p1!==p2)return alert('Passwords do not match');const sb=window.sb;if(!sb)return alert('Database not configured');const {error}=await sb.auth.updateUser({password:p1});if(error)return alert(error.message);alert('Password updated successfully.');location.href='dashboard.html';}</script></body></html>
